<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Third-Party Consumer</title>
  <style>
    body { font-family: Segoe UI, Arial, sans-serif; margin: 20px; }
    button { margin-right: 10px; }
    table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
    th, td { border: 1px solid #ddd; padding: 8px; }
    th { background: #f4f4f4; }
  </style>
</head>
<body>
  <h1>Third-Party Consumer</h1>
  <p>这是一个独立测试界面，用于调用平台 REST API，并通过 .NET API DLL 模拟第三方应用。</p>
  <button onclick="loadDocs()">加载文档</button>
  <button onclick="createDoc()">创建测试文档</button>
  <div id="result"></div>

  <script>
    async function loadDocs() {
      const res = await fetch('/api/documents');
      const docs = await res.json();
      document.getElementById('result').innerHTML = `<h2>Documents</h2>${renderTable(docs)}`;
    }

    async function createDoc() {
      const res = await fetch('/api/documents', { method: 'POST' });
      const doc = await res.json();
      document.getElementById('result').innerHTML = `<p>Created document ID ${doc.id}.</p>` + renderTable([doc]);
    }

    function renderTable(docs) {
      if (!docs || docs.length === 0) return '<p>No documents found.</p>';
      return `<table><thead><tr><th>ID</th><th>Title</th><th>Content</th></tr></thead><tbody>${docs.map(d => `<tr><td>${d.id}</td><td>${d.title}</td><td>${d.content}</td></tr>`).join('')}</tbody></table>`;
    }
  </script>
</body>
</html>
