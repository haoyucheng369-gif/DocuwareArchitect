services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.2
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
    volumes:
      - ./identity/keycloak/docuware-architect-realm.json:/opt/keycloak/data/import/docuware-architect-realm.json:ro

  restapi:
    build:
      context: .
      dockerfile: Platform.RestApi/Dockerfile
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_URLS=http://+:80
      - Authentication__Authority=http://keycloak:8080/realms/docuware-architect
      - Authentication__Audience=platform-rest-api
      - TokenClient__TokenEndpoint=http://keycloak:8080/realms/docuware-architect/protocol/openid-connect/token
      - TokenClient__ClientId=platform-dotnet-sdk
      - TokenClient__ClientSecret=platform-dotnet-sdk-secret
    depends_on:
      - keycloak

  webclient:
    build:
      context: .
      dockerfile: Platform.WebClient/Dockerfile
    ports:
      - "5001:80"
    environment:
      - ASPNETCORE_URLS=http://+:80
      - PlatformApi__BaseUrl=http://restapi
    depends_on:
      - keycloak
      - restapi

  thirdparty:
    build:
      context: .
      dockerfile: ThirdParty.Consumer/Dockerfile
    ports:
      - "5002:80"
    environment:
      - ASPNETCORE_URLS=http://+:80
      - DocuwareClient__BaseUrl=http://restapi
      - DocuwareClient__Username=platform-client
      - DocuwareClient__Password=password
    depends_on:
      - keycloak
      - restapi
